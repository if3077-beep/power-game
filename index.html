<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>权力的游戏 — 两段旅程</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');

:root {
  --bg: #0a0a0a;
  --text: #e8e4de;
  --muted: #6b6560;
  --accent-w: #c9a96e;
  --accent-m: #8b4513;
  --card-bg: rgba(255,255,255,0.03);
  --card-border: rgba(255,255,255,0.06);
  --danger: #8b2500;
  --success: #2d5a27;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'Noto Serif SC', sans-serif;
  overflow-x: hidden;
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
}

/* ====== NOISE OVERLAY ====== */
body::before {
  content:'';
  position:fixed; top:0; left:0; width:100%; height:100%;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9999;
}

/* ====== PARTICLES ====== */
#particles {
  position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:0;
}

/* ====== SCREENS ====== */
.screen {
  display:none;
  min-height:100vh;
  position:relative;
  z-index:1;
}
.screen.active { display:flex; flex-direction:column; }

/* ====== LANDING ====== */
#landing {
  align-items:center; justify-content:center;
  text-align:center;
  padding:2rem;
}

#landing h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(2.5rem, 6vw, 5rem);
  font-weight:900;
  letter-spacing:0.1em;
  margin-bottom:0.5rem;
  background: linear-gradient(135deg, var(--text), var(--accent-w));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: fadeUp 1.2s ease-out;
}

#landing .subtitle {
  font-size: clamp(0.9rem, 2vw, 1.2rem);
  color: var(--muted);
  margin-bottom:4rem;
  animation: fadeUp 1.2s ease-out 0.3s both;
  font-style:italic;
}

#landing .divider-line {
  width:60px; height:1px; background:var(--muted);
  margin:0 auto 3rem;
  animation: fadeUp 1.2s ease-out 0.5s both;
}

.choice-cards {
  display:flex; gap:2rem; flex-wrap:wrap; justify-content:center;
  animation: fadeUp 1.2s ease-out 0.7s both;
}

.choice-card {
  width:340px;
  padding:3rem 2rem;
  background: var(--card-bg);
  border:1px solid var(--card-border);
  cursor:pointer;
  transition: all 0.5s cubic-bezier(0.23,1,0.32,1);
  position:relative;
  overflow:hidden;
}

.choice-card::before {
  content:'';
  position:absolute; top:0; left:0; width:100%; height:2px;
  background: linear-gradient(90deg, transparent, var(--accent-w), transparent);
  transform:scaleX(0);
  transition:transform 0.5s ease;
}
.choice-card:hover::before { transform:scaleX(1); }

.choice-card:hover {
  background: rgba(255,255,255,0.06);
  transform:translateY(-4px);
  border-color: rgba(255,255,255,0.12);
}

.choice-card .card-era {
  font-size:0.7rem;
  text-transform:uppercase;
  letter-spacing:0.3em;
  color:var(--accent-w);
  margin-bottom:1.5rem;
}

.choice-card h2 {
  font-family:'Noto Serif SC', serif;
  font-size:1.6rem;
  font-weight:700;
  margin-bottom:1rem;
  line-height:1.4;
}

.choice-card p {
  font-size:0.85rem;
  color:var(--muted);
  line-height:1.7;
}

.choice-card .card-icon {
  font-size:2.5rem;
  margin-bottom:1rem;
  display:block;
}

/* ====== GAME SCREEN ====== */
#game-screen {
  padding:0;
}

.game-header {
  position:fixed; top:0; left:0; width:100%;
  padding:1.5rem 2rem;
  display:flex; justify-content:space-between; align-items:center;
  z-index:100;
  background: linear-gradient(180deg, var(--bg) 60%, transparent);
}

.game-header .scenario-label {
  font-size:0.7rem;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:var(--accent-w);
}

.game-header .level-indicator {
  font-size:0.75rem;
  color:var(--muted);
  letter-spacing:0.15em;
}

/* STATS BAR */
.stats-bar {
  position:fixed; top:60px; left:0; width:100%;
  padding:0.8rem 2rem;
  display:flex; gap:2rem; justify-content:center;
  z-index:100;
  background: linear-gradient(180deg, rgba(10,10,10,0.95) 60%, transparent);
  opacity:0;
  transition:opacity 0.5s;
}
.stats-bar.visible { opacity:1; }

.stat-item {
  display:flex; align-items:center; gap:0.5rem;
  font-size:0.7rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
}

.stat-label { color:var(--muted); }
.stat-value {
  font-weight:700;
  min-width:20px;
  text-align:center;
  transition: color 0.3s;
}

.stat-bar {
  width:60px; height:2px;
  background: rgba(255,255,255,0.1);
  position:relative;
  overflow:hidden;
}
.stat-bar-fill {
  position:absolute; top:0; left:0; height:100%;
  transition: width 0.8s cubic-bezier(0.23,1,0.32,1);
}

/* SCENE CONTENT */
.scene-container {
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:8rem 2rem 4rem;
  max-width:720px;
  margin:0 auto;
  min-height:100vh;
}

.scene-chapter {
  font-size:0.65rem;
  letter-spacing:0.4em;
  text-transform:uppercase;
  color:var(--accent-w);
  margin-bottom:2rem;
  opacity:0;
  transform:translateY(20px);
}

.scene-text {
  font-family:'Noto Serif SC', serif;
  font-size: clamp(1rem, 2.5vw, 1.25rem);
  line-height:2.2;
  color:var(--text);
  margin-bottom:3rem;
  opacity:0;
  transform:translateY(20px);
}

.scene-text .highlight {
  color:var(--accent-w);
  border-bottom:1px solid rgba(201,169,110,0.3);
}

.scene-text .danger {
  color:#c45c4a;
}

.scene-narrator {
  font-size:0.8rem;
  color:var(--muted);
  font-style:italic;
  margin-bottom:2rem;
  opacity:0;
  transform:translateY(20px);
}

/* CHOICES */
.choices-container {
  width:100%;
  opacity:0;
  transform:translateY(30px);
}

.choice-btn {
  width:100%;
  padding:1.5rem 2rem;
  margin-bottom:0.8rem;
  background: var(--card-bg);
  border:1px solid var(--card-border);
  color:var(--text);
  font-family:'Noto Serif SC', serif;
  font-size:1rem;
  text-align:left;
  cursor:pointer;
  transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
  position:relative;
  overflow:hidden;
  display:block;
}

.choice-btn::after {
  content:'';
  position:absolute; top:0; left:0; width:3px; height:100%;
  background:var(--accent-w);
  transform:scaleY(0);
  transition:transform 0.3s ease;
}
.choice-btn:hover::after { transform:scaleY(1); }

.choice-btn:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.15);
  transform:translateX(8px);
}

.choice-btn .choice-hint {
  display:block;
  font-family:'Inter', sans-serif;
  font-size:0.7rem;
  color:var(--muted);
  margin-top:0.5rem;
  font-style:italic;
}

/* RESULT FLASH */
.result-flash {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-family:'Noto Serif SC', serif;
  font-size:1.5rem;
  color:var(--accent-w);
  pointer-events:none;
  z-index:200;
  opacity:0;
}

/* ====== ENDING SCREEN ====== */
#ending-screen {
  align-items:center; justify-content:center;
  text-align:center;
  padding:4rem 2rem;
}

.ending-title {
  font-family:'Noto Serif SC', serif;
  font-size:clamp(2rem, 5vw, 3.5rem);
  font-weight:900;
  margin-bottom:1rem;
  opacity:0;
  animation: fadeUp 1s ease-out 0.3s both;
}

.ending-subtitle {
  font-size:1rem;
  color:var(--muted);
  margin-bottom:3rem;
  opacity:0;
  animation: fadeUp 1s ease-out 0.6s both;
}

.ending-stats {
  display:flex; gap:3rem; justify-content:center;
  margin-bottom:3rem;
  opacity:0;
  animation: fadeUp 1s ease-out 0.9s both;
}

.ending-stat {
  text-align:center;
}
.ending-stat .val {
  font-size:2.5rem;
  font-weight:700;
  font-family:'Noto Serif SC', serif;
}
.ending-stat .lbl {
  font-size:0.7rem;
  color:var(--muted);
  letter-spacing:0.2em;
  text-transform:uppercase;
}

.ending-verdict {
  max-width:600px;
  font-family:'Noto Serif SC', serif;
  font-size:1.1rem;
  line-height:2;
  margin:0 auto 3rem;
  opacity:0;
  animation: fadeUp 1s ease-out 1.2s both;
}

.ending-quote {
  font-style:italic;
  color:var(--muted);
  font-size:0.9rem;
  margin-bottom:3rem;
  opacity:0;
  animation: fadeUp 1s ease-out 1.5s both;
}

.restart-btn {
  padding:1rem 3rem;
  background:transparent;
  border:1px solid var(--card-border);
  color:var(--text);
  font-family:'Noto Serif SC', serif;
  font-size:1rem;
  cursor:pointer;
  transition:all 0.4s ease;
  opacity:0;
  animation: fadeUp 1s ease-out 1.8s both;
}
.restart-btn:hover {
  background:rgba(255,255,255,0.06);
  border-color:var(--accent-w);
}

/* ====== TYPEWRITER ====== */
.typewriter-cursor {
  display:inline-block;
  width:2px; height:1em;
  background:var(--accent-w);
  margin-left:2px;
  animation: blink 1s step-end infinite;
  vertical-align:text-bottom;
}

/* ====== ANIMATIONS ====== */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(30px); }
  to { opacity:1; transform:translateY(0); }
}

@keyframes blink {
  50% { opacity:0; }
}

@keyframes glitch {
  0% { transform:translate(0); }
  20% { transform:translate(-2px, 2px); }
  40% { transform:translate(2px, -2px); }
  60% { transform:translate(-1px, -1px); }
  80% { transform:translate(1px, 1px); }
  100% { transform:translate(0); }
}

@keyframes pulse {
  0%,100% { opacity:0.5; }
  50% { opacity:1; }
}

@keyframes scanline {
  0% { top:-100%; }
  100% { top:100%; }
}

/* transition overlay */
.transition-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:var(--bg);
  z-index:500;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.4s ease;
}
.transition-overlay.active {
  opacity:1;
  pointer-events:all;
}

/* scanline effect for ming dynasty */
.scanline-effect {
  position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:50;
  opacity:0;
  transition:opacity 0.5s;
}
.scanline-effect.active { opacity:1; }
.scanline-effect::before {
  content:'';
  position:absolute; left:0; width:100%; height:4px;
  background:rgba(139,69,19,0.08);
  animation: scanline 4s linear infinite;
}

/* ink splash for ming */
.ink-splash {
  position:fixed;
  width:200px; height:200px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(139,69,19,0.15), transparent 70%);
  pointer-events:none; z-index:2;
  animation: inkSpread 2s ease-out forwards;
}
@keyframes inkSpread {
  0% { transform:scale(0); opacity:1; }
  100% { transform:scale(4); opacity:0; }
}

/* glitch text */
.glitch-text {
  position:relative;
}
.glitch-text::before,
.glitch-text::after {
  content:attr(data-text);
  position:absolute; top:0; left:0;
  width:100%; height:100%;
}
.glitch-text::before {
  color:#c45c4a;
  clip-path:polygon(0 0, 100% 0, 100% 45%, 0 45%);
  animation:glitch 0.3s ease-in-out;
}
.glitch-text::after {
  color:var(--accent-w);
  clip-path:polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
  animation:glitch 0.3s ease-in-out 0.05s;
}

/* vignette */
.vignette {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  pointer-events:none; z-index:3;
  opacity:0;
  transition:opacity 1s;
}
.vignette.active { opacity:1; }

/* ====== RESPONSIVE ====== */
@media (max-width:768px) {
  .choice-cards { flex-direction:column; align-items:center; }
  .choice-card { width:100%; max-width:360px; }
  .stats-bar { gap:1rem; flex-wrap:wrap; }
  .ending-stats { flex-direction:column; gap:1.5rem; }
  .game-header { padding:1rem; }
  .scene-container { padding:6rem 1.5rem 3rem; }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="transition-overlay" id="transitionOverlay"></div>
<div class="vignette" id="vignette"></div>
<div class="scanline-effect" id="scanline"></div>
<div class="result-flash" id="resultFlash"></div>

<!-- ====== LANDING ====== -->
<div class="screen active" id="landing">
  <h1>权 力 的 游 戏</h1>
  <p class="subtitle">"所有命运赠送的礼物，早已在暗中标好了价格"</p>
  <div class="divider-line"></div>
  <div class="choice-cards">
    <div class="choice-card" onclick="startGame('whitehouse')">
      <span class="card-icon">🏛️</span>
      <div class="card-era">Scenario I — 当代</div>
      <h2>白宫的一天</h2>
      <p>体验权力巅峰的24小时。<br>每个决定都是一场交易，<br>每句话都是一枚棋子。<br><br>参考：《白宫幕僚》《权力的道路》</p>
    </div>
    <div class="choice-card" onclick="startGame('ming')">
      <span class="card-icon">🏯</span>
      <div class="card-era">Scenario II — 穿越</div>
      <h2>大明官场</h2>
      <p>穿越到明朝，从七品知县做起。<br>人情、面子、派系、皇权——<br>你能活到第几集？<br><br>参考：《沧浪之水》《乡土中国》《置身事内》</p>
    </div>
  </div>
</div>

<!-- ====== GAME SCREEN ====== -->
<div class="screen" id="game-screen">
  <div class="game-header">
    <span class="scenario-label" id="scenarioLabel"></span>
    <span class="level-indicator" id="levelIndicator"></span>
  </div>
  <div class="stats-bar" id="statsBar">
    <!-- filled dynamically -->
  </div>
  <div class="scene-container" id="sceneContainer">
    <!-- filled dynamically -->
  </div>
</div>

<!-- ====== ENDING ====== -->
<div class="screen" id="ending-screen">
  <!-- filled dynamically -->
</div>

<script>
// ====== PARTICLE SYSTEM ======
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
let animFrame;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 1.5 + 0.3;
    this.speedY = -(Math.random() * 0.3 + 0.05);
    this.speedX = (Math.random() - 0.5) * 0.2;
    this.opacity = Math.random() * 0.4 + 0.1;
    this.life = Math.random() * 200 + 100;
    this.maxLife = this.life;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.life--;
    if (this.life <= 0 || this.y < -10) this.reset();
  }
  draw() {
    const alpha = this.opacity * (this.life / this.maxLife);
    ctx.fillStyle = `rgba(201,169,110,${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (let i = 0; i < 60; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  animFrame = requestAnimationFrame(animateParticles);
}
animateParticles();

// ====== GAME STATE ======
let state = {
  scenario: null,
  currentScene: 0,
  stats: {},
  choices: [],
  history: []
};

// ====== SCENARIO DATA ======
const scenarios = {

whitehouse: {
  label: '白宫的一天',
  stats: [
    { key:'influence', label:'政治影响力', value:50, color:'#c9a96e' },
    { key:'pressure', label:'精神压力', value:30, color:'#c45c4a' },
    { key:'loyalty', label:'幕僚忠诚', value:60, color:'#6b8f71' },
    { key:'public', label:'民意支持', value:45, color:'#7a8ba0' }
  ],
  scenes: [
    {
      chapter: '第一章 · 清晨',
      title: '总统每日简报',
      text: '清晨6:15，你被叫醒。CIA局长亲自送来每日简报：一份关于对手阵营正在秘密接触军方高层的情报，另一份是昨晚Twitter发言引发的外交风波。\n\n你的幕僚长站在门口，欲言又止。',
      narrator: '「权力的本质不是发号施令，而是让别人心甘情愿地替你挡子弹。」——《白宫幕僚》',
      choices: [
        {
          text: '先处理Twitter风波——民意是根基',
          hint: '「乡土中国」说：面子是中国人社会交往中最微妙的武器。在西方，面子叫 approval rating。',
          effects: { public:12, pressure:10, influence:-5 },
          consequence: '你发了一条澄清推文，支持率回升。但情报被搁置，军方接触对手的消息在下午才被你看到——已经晚了三小时。'
        },
        {
          text: '优先处理军方情报——危机要扼杀在摇篮',
          hint: '「权力的道路」：真正的权力博弈发生在公众视线之外。',
          effects: { influence:15, pressure:15, public:-8 },
          consequence: '你迅速介入，军方高层被约谈。但Twitter风波发酵成热搜，#总统失言# 阅读量破十亿。你的支持率跌了。'
        },
        {
          text: '告诉幕僚长：「两件事你都处理，我需要一个完美的方案」',
          hint: '「置身事内」：领导者最重要的能力不是决策，是让制度运转。',
          effects: { loyalty:10, pressure:5, influence:5 },
          consequence: '幕僚长眼底闪过一丝疲惫，但还是转身去安排了。你知道这不是最后一次让他替你扛。'
        }
      ]
    },
    {
      chapter: '第二章 · 上午',
      title: '内阁会议',
      text: '国防部长和财政部长在会议上吵起来了。国防部长要求增加军费，财政部长说赤字已经到红线。\n\n两个人都在等你表态。更微妙的是——国防部长是你的铁杆盟友，财政部长背后站着华尔街。',
      narrator: '「沧浪之水」：在体制内，最难的不是做事，是摆平做事的人。',
      choices: [
        {
          text: '支持国防部长——忠诚是政治的第一货币',
          hint: '但华尔街的钱是竞选的血液。今天你赢了朋友，明天可能输掉选举。',
          effects: { loyalty:15, influence:5, public:-5, pressure:10 },
          consequence: '国防部长感激涕零。但当晚，三家投行下调了美国信用展望。财政部长开始私下接触你的对手。'
        },
        {
          text: '支持财政部长——经济才是连任的关键',
          hint: '选民不在乎航母有几艘，在乎菜价涨没涨。',
          effects: { public:10, loyalty:-15, influence:5, pressure:5 },
          consequence: '华尔街很满意。但国防部长在记者会上意味深长地说："总统有总统的考量。"幕僚忠诚度断崖下跌。'
        },
        {
          text: '「你们两个都别吵了，下周给我一份联合方案」',

          hint: '你已经学会了规则。也许，你可以用规则来改变规则。',
          effects: { influence:15, morality:-5, pressure:10 },
          consequence: '你被调任府城，官升一级。你开始接触更大的棋局。有一天你忽然发现，你已经在用"为百姓好"来为自己的妥协辩护了。'
        },
        {
          text: '辞官归隐——「我尽力了」',
          hint: '「沧浪之水」的结局：池大为最终选择了权力，但代价是永远失去了曾经的自己。你可以选择另一条路。',
          effects: { morality:15, pressure:-20, influence:-25 },
          consequence: '你回到了故乡。乡亲们还记得你——"那个做了三年官没发财的书生"。你笑了。你终于可以睡一个安稳觉了。但偶尔你会想：如果当初再坚持一下呢？'
        },
        {
          text: '上万言书——把三年所见所闻如实上报',
          hint: '你知道这意味着什么。但也许，总要有人说一次真话。',
          effects: { morality:25, influence:-15, pressure:25, relationship:-15 },
          consequence: '万言书递上去了。石沉大海。三个月后，你被调往边疆——明升暗降。但你的万言书被人抄录，在士林中悄悄流传。你不知道的是，二十年后，一个年轻的御史读到了它。'
        }
      ]
    }
  ]
}

};

// ====== GAME ENGINE ======
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(scenario) {
  state = {
    scenario: scenario,
    currentScene: 0,
    stats: {},
    choices: [],
    history: []
  };
  const sc = scenarios[scenario];
  sc.stats.forEach(s => state.stats[s.key] = s.value);

  // transition
  const overlay = document.getElementById('transitionOverlay');
  overlay.classList.add('active');
  setTimeout(() => {
    showScreen('game-screen');
    document.getElementById('scenarioLabel').textContent = sc.label;
    document.getElementById('vignette').classList.toggle('active', scenario === 'ming');
    document.getElementById('scanline').classList.toggle('active', scenario === 'ming');
    renderStats();
    renderScene();
    setTimeout(() => overlay.classList.remove('active'), 100);
  }, 600);
}

function renderStats() {
  const sc = scenarios[state.scenario];
  const bar = document.getElementById('statsBar');
  bar.innerHTML = sc.stats.map(s => `
    <div class="stat-item">
      <span class="stat-label">${s.label}</span>
      <span class="stat-value" id="sv-${s.key}" style="color:${s.color}">${state.stats[s.key]}</span>
      <div class="stat-bar">
        <div class="stat-bar-fill" id="sb-${s.key}" style="width:${state.stats[s.key]}%;background:${s.color}"></div>
      </div>
    </div>
  `).join('');
  setTimeout(() => bar.classList.add('visible'), 300);
}

function updateStats(effects) {
  const sc = scenarios[state.scenario];
  Object.keys(effects).forEach(key => {
    state.stats[key] = Math.max(0, Math.min(100, state.stats[key] + effects[key]));
    const valEl = document.getElementById(`sv-${key}`);
    const barEl = document.getElementById(`sb-${key}`);
    if (valEl) {
      valEl.textContent = state.stats[key];
      // flash color
      valEl.style.color = effects[key] > 0 ? '#6b8f71' : '#c45c4a';
      setTimeout(() => {
        const stat = sc.stats.find(s => s.key === key);
        valEl.style.color = stat.color;
      }, 800);
    }
    if (barEl) barEl.style.width = state.stats[key] + '%';
  });
}

function showResultFlash(text) {
  const flash = document.getElementById('resultFlash');
  flash.textContent = text;
  flash.style.opacity = '1';
  flash.style.transform = 'translate(-50%, -50%) scale(1)';
  setTimeout(() => {
    flash.style.opacity = '0';
    flash.style.transform = 'translate(-50%, -50%) scale(0.95)';
  }, 1500);
}

function renderScene() {
  const sc = scenarios[state.scenario];
  const scene = sc.scenes[state.currentScene];
  const container = document.getElementById('sceneContainer');
  const level = document.getElementById('levelIndicator');
  level.textContent = `${state.currentScene + 1} / ${sc.scenes.length}`;

  const themeClass = state.scenario === 'ming' ? 'style="font-family:Noto Serif SC, serif"' : '';

  container.innerHTML = `
    <div class="scene-chapter" id="sceneChapter">${scene.chapter}</div>
    <div class="scene-text" id="sceneText"></div>
    <div class="scene-narrator" id="sceneNarrator"></div>
    <div class="choices-container" id="choicesContainer"></div>
  `;

  // animate in
  const chapterEl = document.getElementById('sceneChapter');
  const textEl = document.getElementById('sceneText');
  const narratorEl = document.getElementById('sceneNarrator');
  const choicesEl = document.getElementById('choicesContainer');

  setTimeout(() => {
    chapterEl.style.opacity = '1';
    chapterEl.style.transform = 'translateY(0)';
    chapterEl.style.transition = 'all 0.8s cubic-bezier(0.23,1,0.32,1)';
  }, 100);

  // typewriter for scene text
  setTimeout(() => {
    textEl.style.opacity = '1';
    textEl.style.transform = 'translateY(0)';
    textEl.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
    typewriter(textEl, scene.text, () => {
      // narrator
      setTimeout(() => {
        narratorEl.style.opacity = '1';
        narratorEl.style.transform = 'translateY(0)';
        narratorEl.style.transition = 'all 0.8s ease';
        narratorEl.innerHTML = scene.narrator;
      }, 300);

      // choices
      setTimeout(() => {
        choicesEl.style.opacity = '1';
        choicesEl.style.transform = 'translateY(0)';
        choicesEl.style.transition = 'all 0.8s cubic-bezier(0.23,1,0.32,1)';
        scene.choices.forEach((choice, i) => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.innerHTML = `${choice.text}<span class="choice-hint">${choice.hint}</span>`;
          btn.style.opacity = '0';
          btn.style.transform = 'translateX(-20px)';
          btn.onclick = () => makeChoice(i);
          choicesEl.appendChild(btn);
          setTimeout(() => {
            btn.style.transition = 'all 0.5s cubic-bezier(0.23,1,0.32,1)';
            btn.style.opacity = '1';
            btn.style.transform = 'translateX(0)';
          }, 200 + i * 150);
        });
      }, 800);
    });
  }, 400);
}

function typewriter(el, text, callback) {
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'typewriter-cursor';
  el.textContent = '';
  el.appendChild(cursor);

  function type() {
    if (i < text.length) {
      if (text[i] === '\n') {
        el.insertBefore(document.createElement('br'), cursor);
      } else {
        el.insertBefore(document.createTextNode(text[i]), cursor);
      }
      i++;
      const speed = text[i-1] === '。' ? 120 : text[i-1] === '，' ? 80 : text[i-1] === '\n' ? 200 : 25 + Math.random() * 20;
      setTimeout(type, speed);
    } else {
      setTimeout(() => {
        cursor.remove();
        if (callback) callback();
      }, 500);
    }
  }
  type();
}

function makeChoice(index) {
  const sc = scenarios[state.scenario];
  const scene = sc.scenes[state.currentScene];
  const choice = scene.choices[index];

  state.choices.push({ scene: state.currentScene, choice: index, text: choice.text });
  state.history.push({ ...state.stats });

  // ink splash for ming
  if (state.scenario === 'ming') {
    const splash = document.createElement('div');
    splash.className = 'ink-splash';
    splash.style.left = '50%';
    splash.style.top = '50%';
    document.body.appendChild(splash);
    setTimeout(() => splash.remove(), 2000);
  }

  // update stats
  updateStats(choice.effects);
  showResultFlash(choice.consequence);

  // disable buttons
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.style.pointerEvents = 'none';
    btn.style.opacity = '0.3';
  });

  // show consequence
  const container = document.getElementById('sceneContainer');
  const consequenceEl = document.createElement('div');
  consequenceEl.className = 'scene-narrator';
  consequenceEl.style.marginTop = '2rem';
  consequenceEl.style.opacity = '0';
  consequenceEl.innerHTML = `<strong>结果：</strong>${choice.consequence}`;
  container.appendChild(consequenceEl);
  setTimeout(() => {
    consequenceEl.style.transition = 'all 0.8s ease';
    consequenceEl.style.opacity = '1';
  }, 100);

  // next button
  setTimeout(() => {
    const nextBtn = document.createElement('button');
    nextBtn.className = 'choice-btn';
    nextBtn.style.marginTop = '2rem';
    nextBtn.style.opacity = '0';
    if (state.currentScene < sc.scenes.length - 1) {
      nextBtn.innerHTML = '继续 →';
    } else {
      nextBtn.innerHTML = '查看结局 →';
    }
    nextBtn.onclick = () => {
      const overlay = document.getElementById('transitionOverlay');
      overlay.classList.add('active');
      setTimeout(() => {
        if (state.currentScene < sc.scenes.length - 1) {
          state.currentScene++;
          renderScene();
        } else {
          showEnding();
        }
        setTimeout(() => overlay.classList.remove('active'), 100);
      }, 600);
    };
    container.appendChild(nextBtn);
    setTimeout(() => {
      nextBtn.style.transition = 'all 0.5s ease';
      nextBtn.style.opacity = '1';
    }, 100);
  }, 2000);
}

function showEnding() {
  showScreen('ending-screen');
  document.getElementById('vignette').classList.remove('active');
  document.getElementById('scanline').classList.remove('active');
  document.getElementById('statsBar').classList.remove('visible');

  const sc = scenarios[state.scenario];
  const { influence, pressure, relationship, loyalty, morality, public: pub } = state.stats;
  const rel = relationship || loyalty || 0;
  const mor = morality || pub || 0;

  let title, subtitle, verdict, quote;

  if (state.scenario === 'whitehouse') {
    if (influence > 60 && pressure < 50) {
      title = '棋手';
      subtitle = '你活了下来，而且活得不错';
      verdict = '你学会了权力的游戏规则——不是最聪明的人赢，是最会玩的人赢。你的支持率不错，幕僚还算忠诚，精神状态也还行。但你偶尔会想：那些被你牺牲的原则，值不值？';
      quote = '「权力是最好的春药，也是最好的安眠药。」——基辛格';
    } else if (influence > 60 && pressure >= 50) {
      title = '困兽';
      subtitle = '你赢了，但代价是什么？';
      verdict = '你在政治上站稳了脚跟，但代价是无尽的失眠、焦虑和孤独。你开始理解为什么历届总统卸任后都老了十岁。权力是甜的，但它是裹着糖衣的毒药。';
      quote = '「权力使人腐化，绝对权力使人绝对腐化。」——阿克顿勋爵';
    } else if (influence <= 40 && pressure < 40) {
      title = '隐者';
      subtitle = '你选择了退出';
      verdict = '你没有成为最成功的总统，但你可能是最幸福的。你学会了在权力的游戏中说"不"。也许历史不会记住你，但你的家人会。';
      quote = '「不争，故天下莫能与之争。」——老子';
    } else {
      title = '落子';
      subtitle = '棋盘上还有你的位置，但棋局已经变了';
      verdict = '你的任期充满了妥协和遗憾。你不是最好的，也不是最差的。你学会了一件事：在权力的游戏中，没有赢家，只有还没输的人。';
      quote = '「政治是可能的艺术。」——奥托·冯·俾斯麦';
    }
  } else {
    if (morality > 60 && influence < 30) {
      title = '清风';
      subtitle = '你守住了自己，但官场没有你的位置';
      verdict = '你是清官，但清官在大明活不长。你被调往边疆，仕途坎坷。但你的万言书在士林中流传，你的名字被后人记住。有时候，失败也是一种胜利。';
      quote = '「沧浪之水清兮，可以濯吾缨；沧浪之水浊兮，可以濯吾足。」——屈原';
    } else if (influence > 50 && morality < 40) {
      title = '弄潮';
      subtitle = '你学会了规则，也学会了代价';
      verdict = '你在官场如鱼得水，步步高升。但你也变成了自己曾经最讨厌的那种人。你开始用"为百姓好"来为自己的妥协辩护。也许这就是成长——或者堕落。';
      quote = '「一个人最终都会变成自己曾经最讨厌的样子。」——《沧浪之水》';
    } else if (pressure > 60) {
      title = '倦鸟';
      subtitle = '你累了';
      verdict = '官场的尔虞我诈让你心力交瘁。你选择了辞官归隐，回到了乡下。种田、读书、睡觉——这些曾经最简单的事，现在成了最奢侈的事。';
      quote = '「归去来兮，田园将芜胡不归？」——陶渊明';
    } else {
      title = '浮萍';
      subtitle = '随波逐流，身不由己';
      verdict = '你没有大善，也没有大恶。你学会了在人情和原则之间走钢丝。你活下来了，但你也失去了某种东西——也许是初心，也许是勇气。';
      quote = '「天下熙熙，皆为利来；天下攘攘，皆为利往。」——司马迁';
    }
  }

  const screen = document.getElementById('ending-screen');
  screen.innerHTML = `
    <div class="ending-title glitch-text" data-text="${title}">${title}</div>
    <div class="ending-subtitle">${subtitle}</div>
    <div class="ending-stats">
      ${sc.stats.map(s => `
        <div class="ending-stat">
          <div class="val" style="color:${s.color}">${state.stats[s.key]}</div>
          <div class="lbl">${s.label}</div>
        </div>
      `).join('')}
    </div>
    <div class="ending-verdict">${verdict}</div>
    <div class="ending-quote">${quote}</div>
    <button class="restart-btn" onclick="showScreen('landing')">再来一次</button>
  `;
}
